name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile
        run: python -m compileall app tests scripts

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Secret pattern smoke check
        run: |
          ! git grep -nE '(AIza[0-9A-Za-z_-]{20,}|-----BEGIN (RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----|ghp_[0-9A-Za-z]{36,}|sk-[A-Za-z0-9]{20,})' -- ':!codex'
